<!doctype html>
<html lang="sk">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#12182b">
    <title>Domáci Rytmus - Jedálniček</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <button class="home-mark" type="button" aria-label="Domov">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 10.8 12 3l9 7.8v9.7a1.5 1.5 0 0 1-1.5 1.5h-4.2v-6.3H8.7V22H4.5A1.5 1.5 0 0 1 3 20.5z"></path>
            </svg>
          </button>
          <div>
            <p>Domáci Rytmus</p>
            <h1>Jedálniček</h1>
          </div>
        </div>
        <button class="sync-button" type="button" aria-label="Synchronizácia">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M17.5 18H8a4.5 4.5 0 1 1 .9-8.9A6 6 0 0 1 20.4 11.2 3.4 3.4 0 0 1 17.5 18z"></path>
          </svg>
        </button>
      </header>

      <main class="content">
        <section class="week-switch" aria-label="Výber týždňa">
          <button class="switch-option" data-week="current" type="button">Tento týždeň</button>
          <button class="switch-option is-active" data-week="next" type="button">Budúci týždeň</button>
        </section>

        <section class="week-summary" aria-live="polite">
          <div>
            <p id="weekLabel">Budúci týždeň</p>
            <h2 id="weekRange">13. apríla - 19. apríla</h2>
          </div>
          <div class="audience-toggle" role="group" aria-label="Typ jedálnička">
            <button type="button" data-audience="adults">👥 Dospelí</button>
            <button class="is-active" type="button" data-audience="kids">🧒 Deti</button>
          </div>
        </section>

        <section class="view is-active" data-view="home">
          <section class="home-dashboard" aria-label="Domáci prehľad">
            <div class="dashboard-hero">
              <div>
                <p id="homeEyebrow">Domáci Rytmus</p>
                <h2 id="homeTitle">Prehľad týždňa</h2>
              </div>
              <span class="count-pill" id="homeAudience">Deti</span>
            </div>

            <div class="stats-grid" aria-label="Súhrn">
              <button class="stat-tile" type="button" data-jump-tab="meals">
                <span>Jedlá</span>
                <strong id="homeMealsCount">0</strong>
              </button>
              <button class="stat-tile" type="button" data-jump-tab="tasks">
                <span>Úlohy</span>
                <strong id="homeTasksCount">0</strong>
              </button>
              <button class="stat-tile" type="button" data-jump-tab="shopping">
                <span>Nákup</span>
                <strong id="homeShoppingCount">0</strong>
              </button>
            </div>

            <div class="dashboard-grid">
              <section class="mini-panel">
                <div class="mini-header">
                  <h3>Najbližšie jedlá</h3>
                  <button type="button" data-jump-tab="meals">Otvoriť</button>
                </div>
                <div id="homeMealsList" class="mini-list"></div>
              </section>

              <section class="mini-panel">
                <div class="mini-header">
                  <h3>Otvorené úlohy</h3>
                  <button type="button" data-jump-tab="tasks">Otvoriť</button>
                </div>
                <div id="homeTasksList" class="mini-list"></div>
              </section>

              <section class="mini-panel">
                <div class="mini-header">
                  <h3>Nákup</h3>
                  <button type="button" data-jump-tab="shopping">Otvoriť</button>
                </div>
                <div id="homeShoppingList" class="mini-list"></div>
              </section>
            </div>
          </section>
        </section>

        <section class="view" data-view="meals" hidden>
          <section class="planner-actions" aria-label="Akcie jedálnička">
            <button class="primary-action" id="addMealButton" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"></path></svg>
              <span>Pridať jedlo</span>
            </button>
            <button class="ghost-action" id="resetPlanButton" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7v6h6M20 17v-6h-6M6.3 17A7.8 7.8 0 0 0 19 14.5M17.7 7A7.8 7.8 0 0 0 5 9.5"></path></svg>
              <span>Obnoviť</span>
            </button>
          </section>

          <section id="mealPlan" class="meal-plan" aria-label="Týždenný jedálniček"></section>
        </section>

        <section class="view" data-view="shopping" hidden>
          <section class="shopping-panel" aria-label="Nákupný zoznam">
            <div class="panel-header">
              <div>
                <p>Nákup</p>
                <h2 id="shoppingTitle">Zoznam na týždeň</h2>
              </div>
              <span class="count-pill" id="shoppingCount">0 položiek</span>
            </div>

            <form class="quick-add" id="shoppingForm">
              <input id="shoppingName" type="text" autocomplete="off" maxlength="70" placeholder="Pridať položku">
              <button class="primary-action" type="submit" aria-label="Pridať položku">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"></path></svg>
              </button>
            </form>

            <div id="shoppingList" class="shopping-list"></div>
          </section>
        </section>

        <section class="view" data-view="tasks" hidden>
          <section class="tasks-panel" aria-label="Zoznam úloh">
            <div class="panel-header">
              <div>
                <p>Úlohy</p>
                <h2 id="tasksTitle">Domáci plán</h2>
              </div>
              <span class="count-pill" id="tasksCount">0 otvorených</span>
            </div>

            <form class="task-form" id="taskForm">
              <input id="taskName" type="text" autocomplete="off" maxlength="80" placeholder="Nová úloha">
              <select id="taskPriority" aria-label="Priorita úlohy">
                <option value="normal">Bežná</option>
                <option value="high">Dôležitá</option>
                <option value="low">Nízka</option>
              </select>
              <input id="taskDue" type="date" aria-label="Termín úlohy">
              <button class="primary-action" type="submit" aria-label="Pridať úlohu">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"></path></svg>
              </button>
            </form>

            <div id="taskList" class="task-list"></div>
          </section>
        </section>

        <section class="view" data-view="placeholder" hidden>
          <div class="placeholder-panel">
            <p id="placeholderEyebrow">Domáci Rytmus</p>
            <h2 id="placeholderTitle">Sekcia sa pripravuje</h2>
          </div>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="Hlavná navigácia">
        <button class="is-active" type="button" data-tab="home">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 10.8 12 3l9 7.8v9.7a1.5 1.5 0 0 1-1.5 1.5h-4.2v-6.3H8.7V22H4.5A1.5 1.5 0 0 1 3 20.5z"></path></svg>
          <span>Domov</span>
        </button>
        <button type="button" data-tab="tasks">
          <span class="badge" id="tasksBadge">0</span>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h14a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1zm4 5h6M9 13h6M9 17h4"></path></svg>
          <span>Úlohy</span>
        </button>
        <button type="button" data-tab="shopping">
          <span class="badge wide" id="shoppingBadge">0</span>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 6h2l2.2 9.2a2 2 0 0 0 2 1.5h5.9a2 2 0 0 0 1.9-1.4L21 9H8.1M11 21h.1M18 21h.1"></path></svg>
          <span>Nákup</span>
        </button>
        <button type="button" data-tab="meals">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 3v8M4 3v8M10 3v8M4 11h6M7 11v10M16 3v18M19.5 3c-2.2 1.5-3.5 4.2-3.5 7.2 0 1.8 1.1 3.2 2.6 3.2"></path></svg>
          <span>Jedálniček</span>
        </button>
        <button type="button" data-tab="more">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4zM14 14h6v6h-6z"></path></svg>
          <span>Viac</span>
        </button>
      </nav>
    </div>

    <dialog class="meal-dialog" id="mealDialog">
      <form class="meal-form" id="mealForm" method="dialog">
        <div class="form-header">
          <div>
            <p id="formMode">Nové jedlo</p>
            <h2 id="formTitle">Pridať do jedálnička</h2>
          </div>
          <button class="icon-button" value="cancel" type="button" id="closeDialogButton" aria-label="Zavrieť">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"></path></svg>
          </button>
        </div>

        <input type="hidden" id="editDayIndex">
        <input type="hidden" id="editMealIndex">

        <label>
          Deň
          <select id="mealDay" required></select>
        </label>

        <label>
          Typ jedla
          <select id="mealType" required></select>
        </label>

        <label>
          Názov jedla
          <input id="mealName" type="text" autocomplete="off" maxlength="90" required placeholder="Napr. Paradajková polievka">
        </label>

        <div class="form-actions">
          <button class="ghost-action" type="button" id="cancelDialogButton">Zrušiť</button>
          <button class="primary-action" type="submit">Uložiť</button>
        </div>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
